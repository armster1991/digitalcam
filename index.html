<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Stream Controller Pro</title>
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <style>
        body { margin: 0; background: #121212; color: white; font-family: sans-serif; display: flex; flex-direction: column; height: 100vh; }
        #setup, #interface { padding: 20px; text-align: center; }
        #main-container { display: flex; flex: 1; overflow: hidden; padding: 10px; gap: 10px; }
        #video-container { flex: 2; background: #000; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        video { width: 100%; height: 100%; object-fit: contain; transform: scaleX(-1); }
        #chat-container { flex: 1; min-width: 300px; background: #1f1f1f; border-radius: 8px; overflow: hidden; }
        iframe { width: 100%; height: 100%; border: none; }
        .btn { padding: 15px 25px; margin: 10px; font-size: 16px; cursor: pointer; background: #9146FF; color: white; border: none; border-radius: 5px; }
    </style>
</head>
<body>

    <div id="setup">
        <h1>Escolha seu papel</h1>
        <button class="btn" onclick="init('camera')">Sou o Celular (Transmissor)</button>
        <button class="btn" onclick="init('pc')">Sou o PC (Receptor)</button>
    </div>

    <div id="interface" style="display:none;">
        <div id="controls">
            <h2 id="status">Aguardando...</h2>
            <div id="pc-controls" style="display:none;">
                <input type="text" id="targetId" placeholder="Cole o ID de 8 dígitos">
                <button class="btn" onclick="connectToPeer()">Conectar</button>
            </div>
            <input type="text" id="twitchUser" placeholder="Usuário Twitch (ex: Armster91)">
            <button class="btn" onclick="loadChat()">Carregar Chat</button>
        </div>

        <div id="main-container">
            <div id="video-container">
                <video id="v" autoplay playsinline muted></video>
            </div>
            <div id="chat-container">
                <iframe id="chatFrame"></iframe>
            </div>
        </div>
    </div>

<script>
        let peer, localStream;
        const video = document.getElementById('v');
        const chat = document.getElementById('chatFrame');

        function init(mode) {
            document.getElementById('setup').style.display = 'none';
            document.getElementById('interface').style.display = 'block';

            // Cria o Peer corretamente para ambos os modos
            peer = new Peer(mode === 'camera' ? Math.floor(10000000 + Math.random() * 90000000).toString() : null);

            peer.on('open', id => {
                document.getElementById('status').innerText = mode === 'camera' ? 'Seu ID: ' + id : 'Pronto. Cole o ID do celular:';
                if(mode === 'pc') document.getElementById('pc-controls').style.display = 'block';
            });

            if(mode === 'camera') {
                navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" }, audio: false })
                    .then(stream => {
                        localStream = stream;
                        video.srcObject = stream;
                        peer.on('call', call => {
                            call.answer(stream);
                        });
                    });
            } else {
                peer.on('call', call => {
                    call.answer();
                    call.on('stream', remoteStream => video.srcObject = remoteStream);
                });
            }
        }

        function connectToPeer() {
            const id = document.getElementById('targetId').value;
            if (!peer) {
                alert("Erro: O sistema não inicializou. Recarregue a página.");
                return;
            }
            
            // Aqui garantimos que o peer existe antes de chamar .call
            const call = peer.call(id, new MediaStream());
            call.on('stream', remoteStream => {
                video.srcObject = remoteStream;
            });
        }

        function loadChat() {
            const user = document.getElementById('twitchUser').value;
            const domain = window.location.hostname;
            chat.src = `https://www.twitch.tv/embed/${user}/chat?parent=${domain}`;
        }
    </script>
</body>
</html>
